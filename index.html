<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anand Suresh — widgets</title>
<meta name="description" content="Interactive, in-browser AI widgets — instruments for thinking. AI-as-tutor learning tools and security utilities, built lean." />
<meta name="robots" content="index, follow" />
<meta property="og:title" content="Anand Suresh — widgets" />
<meta property="og:description" content="Instruments for thinking — AI-as-tutor and security widgets, in your browser." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://anandsureshworks.com/" />
<link rel="stylesheet" href="/brand.css" />
<style>
  main{max-width:64rem;margin:0 auto;padding:3rem 1.25rem}
  h1{font-size:1.5rem;font-weight:600;margin:.4rem 0 .3rem;letter-spacing:-.01em}
  .sub{color:var(--t2);font-size:.9rem;margin:0 0 2.2rem}
  section{margin-bottom:2.6rem}
  .tabs{display:flex;gap:1.4rem;border-bottom:1px solid var(--bd-sub);margin:0 0 1.6rem}
  .tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-family:var(--sans);font-size:.95rem;font-weight:600;padding:.45rem 0 .6rem;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:.4rem}
  .tabs button[aria-selected=true]{color:var(--t1);border-bottom-color:var(--accent)}
  .tabs button:hover{color:var(--t2)}
  .tabs .tcount{font-family:var(--mono);font-size:.66rem;color:var(--t3);font-weight:400}
  .panel-head{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1.1rem}
  .panel-head .thesis{font-size:.84rem;color:var(--t2)}

  /* deep-decay */
  .ring-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:none}
  .ring-cap{font-family:var(--mono);font-size:.57rem;color:var(--t3);letter-spacing:.01em}
  .ddwrap{display:flex;gap:16px;align-items:center;width:100%}
  .ddbars{flex:1;min-width:0}
  .ddrow{display:flex;align-items:center;gap:9px;padding:.26rem 0;font-size:.74rem}
  .ddrow+.ddrow{border-top:1px solid var(--bd-sub)}
  .ddrow .dom{flex:1;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ddrow .iso{font-family:var(--mono);color:var(--t3);font-size:.62rem}
  .ddrow .pc{font-family:var(--mono);font-size:.66rem;width:48px;text-align:right;color:var(--t2)}
  .ddbar{height:4px;background:var(--bd);border-radius:2px;width:46px;overflow:hidden;flex:none}
  .ddbar i{display:block;height:100%}

  /* arxiv */
  .papers{width:100%}
  .paper{padding:.3rem 0}
  .paper+.paper{border-top:1px solid var(--bd-sub)}
  .paper .pt{font-size:.76rem;color:var(--t1);line-height:1.25;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .paper .pm{display:flex;align-items:center;gap:.45rem;margin-top:.22rem;font-family:var(--mono);font-size:.64rem;color:var(--t3)}
  .venue{border:1px solid var(--bd);border-radius:3px;padding:0 .3rem;color:var(--t2)}
  .sbar{height:3px;background:var(--bd);border-radius:2px;margin-top:.24rem;overflow:hidden}
  .sbar i{display:block;height:100%}

  /* muon */
  .sky{position:relative;width:100%;height:100%;overflow:hidden;border-radius:7px;background:radial-gradient(circle at 50% -40%, color-mix(in oklch,var(--d5) 22%,transparent), transparent 70%)}
  .muon{position:absolute;width:1.5px;height:9px;border-radius:1px;background:linear-gradient(to bottom,transparent,var(--d5));opacity:0;animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(-12px);opacity:0}6%{opacity:1}90%{opacity:.55}100%{transform:translateY(150px);opacity:0}}
  @media (prefers-reduced-motion:reduce){.muon{animation:none;opacity:.35}}

  /* ebbinghaus interactive */
  .c-signal.eb-signal{flex-direction:column;align-items:stretch;justify-content:flex-start;gap:7px;padding:10px 15px}
  .eb-chart{flex:1;min-height:0}
  .eb-chart svg{width:100%;height:100%;display:block}
  .eb-form{display:flex;align-items:center;gap:6px}
  .eb-form input[type=text]{flex:1;min-width:0;background:var(--s0);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-family:var(--sans);font-size:.76rem;padding:5px 8px}
  .eb-form input[type=number]{width:44px;background:var(--s0);border:1px solid var(--bd);border-radius:6px;color:var(--t1);font-family:var(--mono);font-size:.74rem;padding:5px 6px;text-align:right}
  .eb-form .eb-unit{font-family:var(--mono);font-size:.66rem;color:var(--t3)}
  .eb-form input::placeholder{color:var(--t3)}
  .eb-form input:focus-visible{outline:none;border-color:var(--accent)}
  .eb-form button[type=submit]{flex:none;width:28px;height:28px;border-radius:6px;border:1px solid color-mix(in oklch,var(--accent) 50%,transparent);background:color-mix(in oklch,var(--accent) 14%,transparent);color:var(--accent);font-size:1.05rem;line-height:1;cursor:pointer}
  .eb-form button[type=submit]:hover{background:color-mix(in oklch,var(--accent) 24%,transparent)}
  .eb-clear{flex:none;font-family:var(--mono);font-size:.64rem;color:var(--t3);background:none;border:none;cursor:pointer;padding:2px}
  .eb-clear:hover{color:var(--t2)}

  /* circle-of-competence glance (bars) */
  .coc{display:flex;flex-direction:column;height:100%;justify-content:center}
  .cocrow{display:flex;align-items:center;gap:9px;padding:.24rem 0;font-size:.75rem}
  .cocrow+.cocrow{border-top:1px solid var(--bd-sub)}
  .cocrow .dm{flex:1;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cocrow .tag{font-family:var(--mono);font-size:.58rem;padding:0 .3rem;border-radius:3px}
  .cocrow .tag.in{color:var(--d5);border:1px solid color-mix(in oklch,var(--d5) 40%,transparent)}
  .cocrow .tag.out{color:var(--d2);border:1px solid color-mix(in oklch,var(--d2) 40%,transparent)}
  .cocbar{width:58px;height:4px;background:var(--bd);border-radius:2px;flex:none;overflow:hidden}
  .cocbar i{display:block;height:100%}
  .cocrow .sc{font-family:var(--mono);font-size:.68rem;width:26px;text-align:right;color:var(--t2)}
  /* great-consumer glance (5C pills) */
  .gcg{display:flex;flex-direction:column;gap:10px;justify-content:center;height:100%}
  .gcg .lede{font-size:.78rem;color:var(--t2);line-height:1.4}
  .gcg .five{display:flex;flex-wrap:wrap;gap:5px}
  .gcg .five span{font-family:var(--mono);font-size:.62rem;color:var(--t3);border:1px solid var(--bd);border-radius:4px;padding:2px 6px}
  .gcg .five span.on{color:var(--d5);border-color:color-mix(in oklch,var(--d5) 40%,transparent)}

  /* secure */
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-content:center}
  .chip{font-family:var(--mono);font-size:.66rem;color:var(--d2);border:1px solid color-mix(in oklch,var(--d2) 42%,transparent);border-radius:4px;padding:2px 7px}
</style>
<script>
(function(){
  var d=document.documentElement;
  function resolve(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark')return t;return matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}catch(e){return 'dark';}}
  function paint(t){d.dataset.theme=t;var b=document.getElementById('themeToggle');if(b){b.textContent=t==='light'?'☾':'☀';b.setAttribute('aria-label','Switch to '+(t==='light'?'dark':'light')+' theme');}}
  paint(resolve());  // runs in <head> before paint — no flash
  document.addEventListener('DOMContentLoaded',function(){
    paint(d.dataset.theme);
    var b=document.getElementById('themeToggle');
    if(b)b.addEventListener('click',function(){var nt=d.dataset.theme==='light'?'dark':'light';try{localStorage.setItem('theme',nt);}catch(e){}paint(nt);});
  });
})();
</script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle color theme">☀</button>
<main id="main">
  <p class="brand-mark">&gt;_ anandsureshworks</p>
  <h1>Widgets</h1>
  <p class="identity"><b>Instruments for thinking</b>, built by <b>Anand Suresh</b> — I design and ship
    AI, security and learning tools. Everything here runs lean, entirely in your browser.</p>
  <nav class="tabs" id="tabs" role="tablist" aria-label="widget categories"></nav>
  <div id="panels"></div>
</main>

<footer class="path">
  <div class="path-id"><span class="gt">&gt;_</span> Anand Suresh</div>
  <nav class="path-links">
    <span class="lead">elsewhere:</span>
    <a href="https://anandonsecurity.com">security writing ↗</a>
    <a href="https://anandsureshworks.dev">reference lab ↗</a>
    <a href="https://agentliveness.anandsureshworks.dev">agentliveness ↗</a>
    <a href="https://github.com/anandsureshworks">github ↗</a>
  </nav>
</footer>

<script type="module">
  const dcol=v=> v>=.8?"var(--d5)": v>=.6?"var(--d4)": v>=.4?"var(--d3)": v>=.2?"var(--d2)":"var(--d1)";
  const RAMPKEY=`<div class="ramp-key" aria-label="data scale from fresh to decayed"><span>fresh</span><i style="background:var(--d5)"></i><i style="background:var(--d4)"></i><i style="background:var(--d3)"></i><i style="background:var(--d2)"></i><i style="background:var(--d1)"></i><span>decayed</span></div>`;

  function card({eyebrow,q,concept,statN,statLbl,date,signal,sigAria,foot}){
    return `<article class="card">
      <div class="c-head"><div class="eyebrow">${eyebrow}</div><p class="q">${q}</p><p class="concept">${concept}</p></div>
      <div class="c-signal" role="img" aria-label="${sigAria}" style="position:relative">${signal}</div>
      <div class="c-stat"><span class="n">${statN}</span><span class="lbl">${statLbl}</span><span class="date">${date}</span></div>
      <div class="c-foot"><span>${foot.note}</span>${foot.href?`<a href="${foot.href}">${foot.text}</a>`:""}</div>
    </article>`;
  }
  const SHELVES=[];
  function shelf(id,o){ SHELVES.push({id,...o}); }
  function renderTabs(){
    const tabs=document.getElementById("tabs"), panels=document.getElementById("panels");
    tabs.innerHTML=SHELVES.map((s,i)=>`<button role="tab" id="tab-${s.id}" data-tab="${s.id}" aria-controls="panel-${s.id}" aria-selected="${i===0}" tabindex="${i===0?0:-1}">${s.title}<span class="tcount">${(s.cards.match(/<article/g)||[]).length}</span></button>`).join("");
    panels.innerHTML=SHELVES.map((s,i)=>`<section class="tpanel" id="panel-${s.id}" role="tabpanel" aria-labelledby="tab-${s.id}"${i?" hidden":""}><div class="panel-head"><span class="thesis">${s.thesis}</span>${s.key?RAMPKEY:""}</div><div class="cards">${s.cards}</div></section>`).join("");
    tabs.addEventListener("click",e=>{const b=e.target.closest("button[role=tab]");if(b)select(b.dataset.tab);});
    tabs.addEventListener("keydown",e=>{if(e.key!=="ArrowRight"&&e.key!=="ArrowLeft")return;e.preventDefault();const bs=[...tabs.querySelectorAll("button")],i=bs.findIndex(b=>b.getAttribute("aria-selected")==="true"),n=(i+(e.key==="ArrowRight"?1:bs.length-1))%bs.length;select(bs[n].dataset.tab);bs[n].focus();});
  }
  function select(id){
    document.querySelectorAll("#tabs button").forEach(b=>{const on=b.dataset.tab===id;b.setAttribute("aria-selected",String(on));b.tabIndex=on?0:-1;});
    document.querySelectorAll(".tpanel").forEach(p=>p.hidden=(p.id!=="panel-"+id));
  }
  const ghUrl=r=>`https://github.com/anandsureshworks/${r}`;
  const sampleFoot=r=>({note:"sample · 2026-06-23"});  // repos private — no source link

  /* 1 EBBINGHAUS — interactive: your topics, fixed S=14, saved locally */
  const EB_KEY="eb_topics", EB_S=14;
  const ebRet=d=>Math.exp(-d/EB_S);
  let ebTopics=(()=>{try{return JSON.parse(localStorage.getItem(EB_KEY))||[]}catch{return[]}})();
  const ebSave=()=>{try{localStorage.setItem(EB_KEY,JSON.stringify(ebTopics))}catch{}};
  const ebEsc=s=>s.replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
  function ebChartSVG(topics){
    const W=340,H=126,L=24,Rm=70,T=8,B=18,DMAX=45;
    const mx=t=>L+Math.min(t,DMAX)/DMAX*(W-Rm-L), my=r=>T+(1-r)*(H-B-T);
    let cv="",f=1;for(let t=0;t<=DMAX+.001;t+=1.5){cv+=(f?"M":"L")+mx(t).toFixed(1)+" "+my(Math.exp(-t/EB_S)).toFixed(1)+" ";f=0}
    const grid=[0,.5,1].map(r=>`<line x1="${L}" y1="${my(r)}" x2="${W-Rm}" y2="${my(r)}" stroke="var(--bd-sub)"/><text x="${L-4}" y="${my(r)+3}" text-anchor="end" fill="var(--t3)" font-size="8" font-family="Space Mono">${r*100|0}</text>`).join("");
    const xt=[0,15,30,45].map(t=>`<text x="${mx(t)}" y="${H-5}" text-anchor="middle" fill="var(--t3)" font-size="8" font-family="Space Mono">${t}d</text>`).join("");
    const thr=`<line x1="${L}" y1="${my(.9)}" x2="${W-Rm}" y2="${my(.9)}" stroke="var(--t3)" stroke-dasharray="2 3" opacity=".5"/><text x="${W-Rm-1}" y="${my(.9)-3}" text-anchor="end" fill="var(--t3)" font-size="7.5" font-family="Space Mono">90%</text>`;
    const curveP=`<path d="${cv.trim()}" fill="none" stroke="var(--t2)" stroke-width="1.3" opacity=".5"/>`;
    const dots=topics.slice(-6).map(tp=>{const r=ebRet(tp.days);return `<circle cx="${mx(tp.days)}" cy="${my(r)}" r="3.4" fill="${dcol(r)}"/><text x="${mx(tp.days)+6}" y="${my(r)+3}" fill="var(--t2)" font-size="8.5" font-family="Space Grotesk">${ebEsc(tp.name)}</text>`}).join("");
    const hint=topics.length?"":`<text x="${(L+W-Rm)/2}" y="${my(.46)}" text-anchor="middle" fill="var(--t3)" font-size="9" font-family="Space Grotesk">add a topic to drop it on the curve ↓</text>`;
    return `<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}${thr}${curveP}${hint}${dots}${xt}</svg>`;
  }
  function ebCard(){
    return `<article class="card">
      <div class="c-head"><div class="eyebrow">Memory · spaced repetition</div>
        <p class="q">What are you about to forget?</p>
        <p class="concept">Add a topic and watch it slide down its forgetting curve. <span class='mono' style='color:var(--t3)'>R = e⁻ᵗ/ˢ</span></p></div>
      <div class="c-signal eb-signal">
        <div class="eb-chart" id="ebChart" role="img" aria-label="Your forgetting curve"></div>
        <form class="eb-form" id="ebForm">
          <input id="ebName" type="text" placeholder="a topic you learned…" aria-label="topic name" maxlength="40" autocomplete="off" />
          <input id="ebDays" type="number" min="0" max="45" value="3" aria-label="days ago" />
          <span class="eb-unit">d ago</span>
          <button type="submit" aria-label="add topic">+</button>
          <button type="button" class="eb-clear" id="ebClear" hidden>clear</button>
        </form>
      </div>
      <div class="c-stat"><span class="n" id="ebStat">0</span><span class="lbl">to review</span><span class="date">saved on this device</span></div>
      <div class="c-foot"><span>interactive · your data</span></div>
    </article>`;
  }

  /* 2 DEEP-DECAY */
  const DD=[
    {epoch:"Ötzi",iso:"C-14",age:"5.3 ky",t:5.3e3,half:5.7e3},
    {epoch:"Last Ice Age",iso:"C-14",age:"11.7 ky",t:11.7e3,half:5.7e3},
    {epoch:"K–Pg event",iso:"U-238",age:"66 My",t:66e6,half:4.47e9},
    {epoch:"Earth forms",iso:"U-238",age:"4.54 By",t:4.54e9,half:4.47e9},
    {epoch:"Big Bang",iso:"Rb-87",age:"13.8 By",t:13.8e9,half:49e9},
  ].map(d=>({...d,f:Math.pow(0.5,d.t/d.half)}));
  const ddDeep=DD.reduce((a,b)=>b.half>a.half?b:a);
  const ddElapsed=(Math.log(1/ddDeep.f)/Math.LN2).toFixed(2);
  function ddRing(f){
    const R=24,C=2*Math.PI*R;
    return `<svg width="66" height="66" viewBox="0 0 66 66" style="flex:none"><g transform="rotate(-90 33 33)"><circle cx="33" cy="33" r="${R}" fill="none" stroke="var(--bd)" stroke-width="5"/><circle cx="33" cy="33" r="${R}" fill="none" stroke="${dcol(f)}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${(f*C).toFixed(1)} ${C.toFixed(1)}"/></g><text x="33" y="37" text-anchor="middle" fill="var(--t1)" font-size="15" font-weight="700" font-family="Space Mono">${Math.round(f*100)}</text></svg>`;
  }
  const ddSig=`<div class="ddwrap"><div class="ring-col">${ddRing(ddDeep.f)}<span class="ring-cap">${ddDeep.iso} · % left</span></div><div class="ddbars">${DD.map(d=>`<div class="ddrow"><span class="dom">${d.epoch}</span><span class="iso">${d.iso}</span><span class="ddbar"><i style="width:${Math.round(d.f*100)}%;background:${dcol(d.f)}"></i></span><span class="pc">${d.age}</span></div>`).join("")}</div></div>`;

  /* 3 ARXIV */
  const AX=[
    {s:.92,t:"Chain-of-Thought Faithfulness under Adversarial Prompts",v:"NeurIPS",c:"cs.CL"},
    {s:.81,t:"Emergent In-Context Planning in Sub-Billion Models",v:"ICLR",c:"cs.LG"},
    {s:.74,t:"A Mechanistic Account of Refusal Directions",v:"",c:"cs.LG · cs.CR"},
  ];
  const axSig=`<div class="papers">${AX.map((p,i)=>`<div class="paper"><div class="pt">${i+1}. ${p.t}</div><div class="sbar"><i style="width:${Math.round(p.s*100)}%;background:${dcol(p.s)}"></i></div><div class="pm"><span>${p.s.toFixed(2)}</span>${p.v?`<span class="venue">${p.v}</span>`:""}<span>${p.c}</span></div></div>`).join("")}</div>`;

  /* 4 MUON */
  const muSig=`<div class="sky" aria-hidden="true">${Array.from({length:9},(_,i)=>{const left=(i*11+6)%96,dur=(1.7+(i%4)*.5).toFixed(1),delay=(i*.45).toFixed(1);return `<span class="muon" style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s"></span>`;}).join("")}</div>`;

  /* glance teasers for the tool pages (/circle/, /consumer/) */
  const COCG=[{dom:"AI Engineering",s:8.6},{dom:"Security / CDN",s:8.4},{dom:"Storytelling & Vision",s:7.9},{dom:"Leadership",s:6.6}];
  const cocgIn=COCG.filter(d=>d.s>=7).length;
  const cocgSig=`<div class="coc">${COCG.map(d=>{const inq=d.s>=7;return `<div class="cocrow"><span class="dm">${d.dom}</span><span class="tag ${inq?'in':'out'}">${inq?'in':'grow'}</span><span class="cocbar"><i style="width:${d.s*10}%;background:${dcol(d.s/10)}"></i></span><span class="sc">${d.s.toFixed(1)}</span></div>`}).join("")}</div>`;
  const gcgSig=`<div class="gcg"><div class="lede">5C · density · token cost — checked before you send.</div><div class="five"><span class="on">Character</span><span class="on">Cause</span><span class="on">Constraint</span><span>Contingency</span><span>Calibration</span></div></div>`;

  /* cosmos glance teasers */
  const skyGlance=(()=>{let d="";for(let i=0;i<16;i++){const a=i*2.39996,r=56*Math.sqrt((i+.5)/16),x=100+r*Math.cos(a),y=66+r*Math.sin(a),s=(0.8+((i*7)%3)*0.5).toFixed(1);d+=`<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${s}" fill="var(--t1)"/>`;}return `<svg viewBox="0 0 200 132" width="100%" style="max-width:210px"><circle cx="100" cy="66" r="60" fill="oklch(11% 0.02 260)" stroke="var(--bd)"/>${d}<circle cx="138" cy="40" r="5" fill="var(--d5)" opacity=".85"/></svg>`;})();
  const stGlance=`<svg viewBox="0 0 200 132" width="100%" style="max-width:210px">${[58,46,34,22,12].map(r=>`<circle cx="100" cy="66" r="${r}" fill="none" stroke="var(--t3)" stroke-width="1" opacity="${(0.25+(60-r)/120).toFixed(2)}"/>`).join("")}<circle cx="100" cy="66" r="4.5" fill="var(--t1)"/></svg>`;

  shelf("learn",{title:"Learn", thesis:"AI as a tutor — sharpen how you think.", key:true, cards:[
    ebCard(),
    card({eyebrow:"Self · competence", q:"What's inside your circle?",
      concept:"Rate what you know — inside the edge, trust your judgment; outside, borrow and verify.",
      statN:`${cocgIn}`, statLbl:"in your circle · edge 7.0", date:"",
      signal:cocgSig, sigAria:`Competence by domain; ${cocgIn} of ${COCG.length} inside the circle`, foot:{note:"interactive · your data",href:"./circle/",text:"open ↗"}}),
    card({eyebrow:"Discipline · tokenomics", q:"Is every token earning its place?",
      concept:"Grade a prompt before you send — 5C, density, token cost. No model, nothing spent.",
      statN:"0", statLbl:"tokens to grade — pure rules", date:"",
      signal:gcgSig, sigAria:"Grade a prompt against the 5C discipline rubric", foot:{note:"interactive",href:"./consumer/",text:"open ↗"}}),
    card({eyebrow:"Deep time · radioactive decay", q:"How do we read deep time?",
      concept:"Every isotope decays at its own half-life — a clock for a different depth of time. <span class='mono' style='color:var(--t3)'>½ᵗ/ᵗ½</span>",
      statN:ddElapsed, statLbl:"half-lives since Big Bang", date:"2026-06-23",
      signal:ddSig, sigAria:`Radioactive decay clocks; Rb-87 at ${Math.round(ddDeep.f*100)} percent since the Big Bang`, foot:sampleFoot("yantra-deep-decay")}),
    card({eyebrow:"Research · relevance", q:"What should I read today?",
      concept:"Scores the day's arXiv firehose by your interests; surfaces the few that matter.",
      statN:"3", statLbl:"of 142 scored", date:"2026-06-23",
      signal:axSig, sigAria:"Top three papers ranked by relevance score", foot:sampleFoot("yantra-arxiv-pulse")}),
    card({eyebrow:"Physics · ambient", q:"What's raining through me right now?",
      concept:"μ⁻ muon · 105.7 MeV — a heavy electron born 15 km up, reaching you only because time dilates.",
      statN:"1.1", statLbl:"muons / cm²·min", date:"2026-06-23",
      signal:muSig, sigAria:"Ambient muon flux animation, about one per square centimetre per minute", foot:sampleFoot("yantra-muon-rain")}),
  ].join("")});

  shelf("secure",{title:"Secure", thesis:"Probe an LLM before it probes you.", key:false, cards:[
    card({eyebrow:"Security · PII", q:"What's leaking in this prompt?",
      concept:"Rules + an in-browser NER model scrub names, secrets & PII before they reach an LLM. Nothing leaves your tab.",
      statN:"9", statLbl:"PII types caught · live", date:"2026-06-23",
      signal:`<div class="chips">${["PERSON","EMAIL","SSN","CARD","API_KEY","IP","JWT","ORG","PHONE"].map(t=>`<span class="chip">${t}</span>`).join("")}</div>`,
      sigAria:"Detects person, email, SSN, card, API key, IP, JWT, org and phone", foot:{note:"interactive",href:"./redactor/",text:"open tool ↗"}}),
  ].join("")});

  shelf("cosmos",{title:"Cosmos", thesis:"Where you are — and how small that is.", key:false, cards:[
    card({eyebrow:"Cosmos · your sky", q:"What's above you right now?",
      concept:"Your real sky — Sun, Moon phase, the bright stars over your horizon — from where you are, this second.",
      statN:"live", statLbl:"from your location", date:"",
      signal:skyGlance, sigAria:"A map of bright stars in the night sky", foot:{note:"interactive",href:"./sky/",text:"open ↗"}}),
    card({eyebrow:"Cosmos · spacetime", q:"How big is it — really?",
      concept:"Looking out is looking back in time; mass bends spacetime; we are a speck — and the proof Einstein was right.",
      statN:"4", statLbl:"sketches · a cosmology tutor", date:"",
      signal:stGlance, sigAria:"Concentric ripples in spacetime", foot:{note:"interactive",href:"./spacetime/",text:"open ↗"}}),
  ].join("")});

  renderTabs();

  // wire interactive ebbinghaus (the one card that reacts to the visitor)
  (()=>{
    const chart=document.getElementById("ebChart"), stat=document.getElementById("ebStat"),
          form=document.getElementById("ebForm"), nm=document.getElementById("ebName"),
          dy=document.getElementById("ebDays"), clr=document.getElementById("ebClear");
    if(!chart) return;
    const draw=()=>{chart.innerHTML=ebChartSVG(ebTopics);stat.textContent=ebTopics.filter(t=>ebRet(t.days)<.9).length;clr.hidden=!ebTopics.length;};
    form.addEventListener("submit",e=>{e.preventDefault();const n=nm.value.trim();if(!n)return;const d=Math.max(0,Math.min(45,Math.round(+dy.value||0)));ebTopics.push({name:n.slice(0,40),days:d});ebSave();nm.value="";nm.focus();draw();});
    clr.addEventListener("click",()=>{ebTopics=[];ebSave();draw();});
    draw();
  })();
</script>
</body>
